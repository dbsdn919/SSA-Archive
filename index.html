<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Site Specific Arts — 장소 특정적 예술 전시 아카이브">
  <title>Site Specific Arts — Exhibition Archive</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app-container">

  <!-- Header -->
  <header class="header" id="header">
    <div class="logo">
      <span class="logo-ko active" data-lang="ko">장소 특정적 미술</span>
      <span class="logo-en" data-lang="en">Site-Specific Art</span>
    </div>
    <div class="lang-toggle" id="langToggle">
      <div class="lang-slider"></div>
      <span class="lang-option active" data-lang="ko">한</span>
      <span class="lang-option" data-lang="en">EN</span>
    </div>
  </header>

  <!-- Hero: 3D Globe -->
  <section class="hero" id="hero">
    <canvas id="globe-canvas"></canvas>
    <div id="labels-container"></div>
    
    <div class="intro-section">
      <p class="intro-section__title" id="introTitle" data-ko="전시 · 2026" data-en="EXHIBITION · 2026">전시 · 2026</p>
      <h2 class="intro-section__main-title" id="introMainTitle" style="display: none;"></h2>
      <p class="intro-section__text" id="introText" data-ko="이 아카이브는 캠퍼스의 특정한 장소들에 깃든 시간과 흔적을 기록한 작업을 모은다. 작품은 그 자리에 놓이는 것이 아니라, 그 자리에서 발생한다. 구를 돌려 작품을 둘러보고, 점을 눌러 각 작업의 설명을 읽어보세요." data-en="This archive collects works that record the time and traces embedded in specific campus locations. The artwork is not placed there, but occurs there. Rotate the sphere to look around the works, and press the dots to read the description of each work.">
        이 아카이브는 캠퍼스의 특정한 장소들에 깃든 시간과 흔적을 기록한 작업을 모은다. 작품은 그 자리에 놓이는 것이 아니라, 그 자리에서 발생한다. 구를 돌려 작품을 둘러보고, 점을 눌러 각 작업의 설명을 읽어보세요.
      </p>
      
      <div class="intro-actions" id="introActions" style="display: none;">
        <button class="btn-find" id="btnFind">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
          <span data-ko="찾기" data-en="Find">찾기</span>
        </button>
        <button class="btn-close" id="btnClose" data-ko="닫기" data-en="Close">닫기</button>
      </div>
    </div>

    <div class="globe-hint" id="globeHint" data-ko="구를 돌리고 점을 눌러보세요" data-en="DRAG SPHERE · TAP A DOT">
      구를 돌리고 점을 눌러보세요
    </div>
  </section>

  <!-- Artwork Detail Overlay -->
  <div class="artwork-detail" id="artworkDetail">
    <div class="artwork-detail__content">
      <div class="artwork-detail__number" id="artworkNumber">01 / 08</div>
      <h2 class="artwork-detail__title" id="artworkTitle"></h2>
      <p class="artwork-detail__artist" id="artworkArtist"></p>
      <p class="artwork-detail__description" id="artworkDescription"></p>
      <div class="artwork-detail__location" id="artworkLocation"></div>
      <br><br>
      <button class="artwork-detail__close" id="artworkClose" data-ko="돌아가기" data-en="Go Back">돌아가기</button>
    </div>
  </div>

  <!-- Find My Mode Overlay -->
  <div class="find-overlay" id="findOverlay">
    <!-- Find Header -->
    <div class="find-header">
      <div class="btn-back-find" id="btnExitFind">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        <span class="status-text" data-ko="찾는 중" data-en="Finding...">찾는 중</span>
      </div>
    </div>

    <!-- Center Radar -->
    <div class="find-radar-container">
      <div class="find-radar-rings">
        <div class="radar-ring ring-1"></div>
        <div class="radar-ring ring-2"></div>
        <div class="radar-ring ring-3">
          <div class="target-dot" id="targetDot"></div>
        </div>
      </div>
      <div class="find-distance-center">
        <div class="distance-value" id="findDistanceVal">
          <div class="digit-slot"><div class="digit-column"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div></div>
          <div class="digit-slot"><div class="digit-column"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div></div>
          <div class="digit-slot"><div class="digit-column"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div></div>
        </div>
        <div class="distance-unit" data-ko="미터" data-en="meters">미터</div>
      </div>
    </div>

    <!-- Bottom Info -->
    <div class="find-bottom-info">
      <div class="info-artist" id="findInfoArtist">전종우 · 2026</div>
      <div class="info-title" id="findInfoTitle">Echo of Stairs</div>
      <div class="info-location" id="findInfoLocation">예술대학 B동 계단실</div>
    </div>

    <!-- Footer Hint -->
    <div class="find-footer-hint" data-ko="화살표를 따라 걸어가세요" data-en="Follow the arrow to walk">
      화살표를 따라 걸어가세요
    </div>
  </div>



  </div>

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="app.js"></script>

</body>

</html>
